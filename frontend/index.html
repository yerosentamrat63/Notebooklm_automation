<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="/static/icons/icon-192.png">
  <link rel="apple-touch-icon" href="/static/icons/icon-192.png">
  <title>NotebookLM Auto-Pilot</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div id="app">
    <header>
      <h1>NotebookLM <span class="light">Auto-Pilot</span></h1>
      <p class="subtitle">Upload files &rarr; NotebookLM generates study materials</p>
    </header>

    <main>
      <div id="upload-area" class="card">
        <div class="upload-zone" id="drop-zone">
          <div class="upload-icon">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#8ab4f8" stroke-width="1.5">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="17 8 12 3 7 8"/>
              <line x1="12" y1="3" x2="12" y2="15"/>
            </svg>
          </div>
          <p class="upload-text">Tap to select files</p>
          <p class="upload-hint">PDF, DOCX, PPTX</p>
          <input type="file" id="file-input" accept=".pdf,.docx,.pptx" multiple hidden>
        </div>

        <div id="file-list" class="file-list hidden"></div>
      </div>

      <div id="config-panel" class="card hidden">
        <div class="field">
          <label for="notebook-name">Notebook name</label>
          <input type="text" id="notebook-name" placeholder="My Study Notebook" class="input">
        </div>

        <div class="section-title">What to generate</div>

        <label class="option-row">
          <span class="option-label">
            <span class="option-name">Mind Map</span>
            <span class="option-desc">Visual concept diagram</span>
          </span>
          <input type="checkbox" id="gen-mindmap" checked class="toggle">
          <span class="toggle-slider"></span>
        </label>

        <label class="option-row">
          <span class="option-label">
            <span class="option-name">Quiz</span>
            <span class="option-desc">Test your knowledge</span>
          </span>
          <input type="checkbox" id="gen-quiz" checked class="toggle">
          <span class="toggle-slider"></span>
        </label>

        <div id="quiz-options" class="nested-options">
          <div class="pill-group">
            <div class="pill-group-label">Number of Questions</div>
            <div class="pill-row">
              <button type="button" class="pill" data-group="quiz-quantity" data-value="fewer">Fewer</button>
              <button type="button" class="pill active" data-group="quiz-quantity" data-value="standard">Standard (Default)</button>
              <button type="button" class="pill" data-group="quiz-quantity" data-value="more">More</button>
            </div>
          </div>
          <div class="pill-group">
            <div class="pill-group-label">Level of Difficulty</div>
            <div class="pill-row">
              <button type="button" class="pill" data-group="quiz-difficulty" data-value="easy">Easy</button>
              <button type="button" class="pill active" data-group="quiz-difficulty" data-value="medium">Medium (Default)</button>
              <button type="button" class="pill" data-group="quiz-difficulty" data-value="hard">Hard</button>
            </div>
          </div>
          <div class="field" style="margin-top:12px">
            <label for="quiz-instructions">What should the topic be?</label>
            <textarea id="quiz-instructions" class="input textarea" rows="3" placeholder="e.g. Focus on key concepts from chapters 1-3"></textarea>
          </div>
        </div>

        <label class="option-row">
          <span class="option-label">
            <span class="option-name">Flashcards</span>
            <span class="option-desc">Study cards</span>
          </span>
          <input type="checkbox" id="gen-flashcards" class="toggle">
          <span class="toggle-slider"></span>
        </label>

        <div id="flashcard-options" class="nested-options hidden">
          <div class="pill-group">
            <div class="pill-group-label">Number of Cards</div>
            <div class="pill-row">
              <button type="button" class="pill" data-group="fc-quantity" data-value="fewer">Fewer</button>
              <button type="button" class="pill active" data-group="fc-quantity" data-value="standard">Standard (Default)</button>
              <button type="button" class="pill" data-group="fc-quantity" data-value="more">More</button>
            </div>
          </div>
          <div class="pill-group">
            <div class="pill-group-label">Level of Difficulty</div>
            <div class="pill-row">
              <button type="button" class="pill" data-group="fc-difficulty" data-value="easy">Easy</button>
              <button type="button" class="pill active" data-group="fc-difficulty" data-value="medium">Medium (Default)</button>
              <button type="button" class="pill" data-group="fc-difficulty" data-value="hard">Hard</button>
            </div>
          </div>
          <div class="field" style="margin-top:12px">
            <label for="fc-instructions">What should the topic be?</label>
            <textarea id="fc-instructions" class="input textarea" rows="3" placeholder="e.g. Focus on key terms and definitions"></textarea>
          </div>
        </div>

        <button id="submit-btn" class="btn" disabled>
          Create Notebook
        </button>
      </div>

      <div id="progress-panel" class="card hidden">
        <div class="spinner"></div>
        <div id="progress-status">Creating notebook...</div>
        <div id="progress-detail" class="progress-detail"></div>
        <div class="progress-steps" id="progress-steps"></div>
      </div>

      <div id="result-panel" class="card hidden">
        <div class="success-icon">
          <svg width="64" height="64" viewBox="0 0 24 24" fill="#81c995">
            <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/>
          </svg>
        </div>
        <h2>Done!</h2>
        <p id="result-text" class="result-text"></p>
        <a id="notebook-link" href="#" target="_blank" rel="noopener" class="btn btn-primary">
          Open in NotebookLM
        </a>
        <button id="new-btn" class="btn btn-secondary">Create Another</button>
      </div>
    </main>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
